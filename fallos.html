<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>◊ FallDesk · Sovereign Workstation</title>
<meta name="description" content="FallDesk · one HTML file. A sovereign workstation that contains your whole estate — personal, business, every vertical — installable apps, an LLM-agnostic build engine for new tools, and a marketplace browsing 150+ Fall apps. Progressive Web App. Works offline.">
<meta name="prime" content="1061">
<meta name="theme-color" content="#0b0a0f">
<link rel="manifest" href='data:application/manifest+json,{"name":"FallDesk","short_name":"FallDesk","start_url":"./","display":"standalone","background_color":"%230b0a0f","theme_color":"%23b8974a","icons":[{"src":"data:image/svg+xml;utf8,<svg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 192 192%27><rect width=%27192%27 height=%27192%27 fill=%27%230b0a0f%27 rx=%2728%27/><text x=%2796%27 y=%27140%27 font-family=%27Georgia, serif%27 font-size=%27122%27 font-weight=%27700%27 text-anchor=%27middle%27 fill=%27%23b8974a%27>%E2%97%8A</text></svg>","sizes":"192x192","type":"image/svg+xml"}]}'>
<style>
:root{--void:#0b0a0f;--void-2:#13121a;--ink:#1a1922;--line:#2a2934;--line-soft:#1f1e28;--cream:#e6e1d6;--cream-dim:#a8a395;--cream-muted:#6e6a5e;--brass:#b8974a;--amber:#ff8c00;--ox:#8b1a1a;--green:#4ade80;--red:#ef4444;--blue:#60a5fa;--yellow:#fbbf24;--violet:#a855f7;--serif:Georgia,'Libre Baskerville',ui-serif,serif;--sans:'Inter',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;--mono:'IBM Plex Mono','SF Mono',ui-monospace,Menlo,monospace}
*{margin:0;padding:0;box-sizing:border-box}html,body{background:var(--void);color:var(--cream);font:14px/1.55 var(--sans);min-height:100dvh;-webkit-font-smoothing:antialiased;overflow:hidden}
button{font-family:inherit;cursor:pointer;background:transparent;border:none;color:inherit;text-align:left}
input,textarea,select{font-family:inherit;background:var(--ink);border:1px solid var(--line);color:var(--cream);border-radius:3px;padding:8px 11px;outline:none;font-size:13px}
input:focus,textarea:focus,select:focus{border-color:var(--brass)}
.app{height:100dvh;display:grid;grid-template-rows:54px 1fr;overflow:hidden}
header{display:flex;align-items:center;border-bottom:1px solid var(--line);background:var(--void-2);user-select:none;padding:0 16px;gap:14px}
.brand{display:flex;align-items:center;gap:10px;flex-shrink:0}
.brand .mark{width:32px;height:32px;background:linear-gradient(135deg,var(--brass),var(--amber));border-radius:5px;display:grid;place-items:center;font-family:var(--serif);font-weight:700;font-size:18px;color:var(--void)}
.brand .name{font-family:var(--serif);font-weight:700;font-size:16px}
.brand .seal{font-family:var(--mono);font-size:9px;color:var(--cream-muted);letter-spacing:0.15em;text-transform:uppercase}
.searchbar{flex:1;max-width:520px;margin:0 auto}
.searchbar input{padding:7px 12px;font-size:13px;background:var(--ink)}
.tier{padding:5px 10px;border-radius:3px;font-size:10px;color:var(--cream-dim);font-family:var(--mono);border:1px solid var(--line);letter-spacing:0.06em;text-transform:uppercase;cursor:pointer;flex-shrink:0}
.shell{display:grid;grid-template-columns:240px 1fr;height:100%;overflow:hidden}
aside{background:var(--void-2);border-right:1px solid var(--line);overflow-y:auto;padding:14px 0}
.side-section{padding:10px 14px 4px;font-family:var(--mono);font-size:9px;color:var(--cream-muted);letter-spacing:0.18em;text-transform:uppercase}
.side-item{display:flex;align-items:center;gap:10px;padding:7px 14px;color:var(--cream-dim);font-size:13px;cursor:pointer;border-left:2px solid transparent}
.side-item:hover{background:var(--ink);color:var(--cream)}
.side-item.active{background:var(--ink);color:var(--brass);border-left-color:var(--brass)}
.side-item .count{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--cream-muted)}
.side-item.soon{opacity:0.4;cursor:not-allowed}
.side-item.soon:hover{background:transparent;color:var(--cream-dim)}
.side-item.soon .badge{margin-left:auto;font-family:var(--mono);font-size:9px;color:var(--cream-muted);background:var(--ink);padding:2px 5px;border-radius:2px}
main{overflow-y:auto;padding:24px 30px 80px}
.iframe-shell{position:absolute;inset:54px 0 0 240px;background:white}
.iframe-shell iframe{width:100%;height:100%;border:none}
.iframe-back{position:absolute;top:62px;right:16px;z-index:10;background:var(--void-2);border:1px solid var(--brass);padding:6px 12px;border-radius:3px;font-size:11px;font-family:var(--mono);color:var(--brass);cursor:pointer}
.iframe-back:hover{background:var(--brass);color:var(--void)}
.hero{background:linear-gradient(135deg,rgba(184,151,74,0.08),rgba(255,140,0,0.04));border:1px solid var(--brass);border-radius:6px;padding:24px 26px;margin-bottom:20px}
.hero h1{font-family:var(--serif);font-size:22px;font-weight:700;margin-bottom:6px;color:var(--brass)}
.hero .lede{font-size:13px;color:var(--cream-dim);line-height:1.65}
.section-h{display:flex;justify-content:space-between;align-items:baseline;margin:20px 0 12px;gap:14px;flex-wrap:wrap}
.section-h h2{font-family:var(--serif);font-size:17px;font-weight:600}
.section-h .sub{font-family:var(--mono);font-size:10px;color:var(--cream-muted);letter-spacing:0.08em;text-transform:uppercase}
.section-h .actions{display:flex;gap:6px}
.app-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
.app-tile{background:var(--void-2);border:1px solid var(--line);border-radius:5px;padding:14px 16px;cursor:pointer;display:flex;flex-direction:column;gap:8px;transition:border-color 0.15s,background 0.15s;position:relative;min-height:118px}
.app-tile:hover{border-color:var(--brass);background:var(--ink)}
.app-tile .icon{width:36px;height:36px;background:linear-gradient(135deg,var(--brass),var(--amber));color:var(--void);border-radius:5px;display:grid;place-items:center;font-family:var(--serif);font-weight:700;font-size:14px;text-transform:uppercase}
.app-tile .nm{font-family:var(--serif);font-size:14px;font-weight:600;color:var(--cream)}
.app-tile .purpose{font-size:11px;color:var(--cream-dim);line-height:1.45;flex:1}
.app-tile .meta{font-family:var(--mono);font-size:9px;color:var(--cream-muted);display:flex;justify-content:space-between;align-items:center}
.app-tile .status{position:absolute;top:10px;right:10px;width:8px;height:8px;border-radius:50%}
.app-tile .status.installed{background:var(--green)}
.app-tile .status.generated{background:var(--violet)}
.app-tile .status.market{background:var(--cream-muted)}
.app-tile .status.pinned{background:var(--brass);box-shadow:0 0 6px var(--brass)}
.btn{padding:7px 14px;border:1px solid var(--brass);border-radius:3px;font-size:12px;color:var(--cream);background:transparent}
.btn:hover{border-color:var(--amber);color:var(--amber)}
.btn.brass{background:var(--brass);color:var(--void);border-color:var(--brass);font-weight:600}
.btn.brass:hover{background:var(--amber)}
.btn.sm{padding:4px 9px;font-size:11px}
.btn.ghost{border-color:var(--line);color:var(--cream-dim)}
.btn.danger:hover{border-color:var(--red);color:var(--red)}
.btn:disabled{opacity:0.4;cursor:not-allowed}
.card{background:var(--void-2);border:1px solid var(--line);border-radius:5px;padding:16px 18px;margin-bottom:12px}
.card h3{font-family:var(--serif);font-size:14px;font-weight:600;margin-bottom:10px}
.filter-bar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.filter-chip{padding:5px 12px;font-size:11px;border:1px solid var(--line);border-radius:14px;color:var(--cream-dim);background:var(--ink);cursor:pointer}
.filter-chip:hover{border-color:var(--brass);color:var(--cream)}
.filter-chip.active{border-color:var(--brass);color:var(--brass);background:rgba(184,151,74,0.1)}
.empty{padding:40px;text-align:center;color:var(--cream-muted);font-style:italic;font-size:13px}
.field label{display:block;font-family:var(--mono);font-size:10px;color:var(--cream-muted);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:4px}
.field input,.field select,.field textarea{width:100%}
.row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:16px}
.kpi{background:var(--void-2);border:1px solid var(--line);border-radius:4px;padding:12px 14px}
.kpi .label{font-family:var(--mono);font-size:10px;color:var(--cream-muted);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:3px}
.kpi .val{font-family:var(--serif);font-size:20px;font-weight:700;color:var(--brass)}
.disclaimer{background:rgba(139,26,26,0.12);border:1px solid var(--ox);border-left:3px solid var(--ox);border-radius:3px;padding:10px 14px;margin-bottom:14px;font-size:12px;line-height:1.55;color:var(--cream-dim)}
.disclaimer strong{color:var(--brass)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--brass);color:var(--void);padding:9px 18px;border-radius:3px;font-family:var(--mono);font-size:11px;letter-spacing:0.06em;text-transform:uppercase;font-weight:700;opacity:0;transition:all 0.22s;z-index:1100;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.75);display:none;align-items:center;justify-content:center;padding:18px;z-index:900;backdrop-filter:blur(4px)}
.modal-bg.open{display:flex}
.modal{background:var(--void-2);border:1px solid var(--brass);border-radius:6px;padding:24px;max-width:640px;width:100%;max-height:90vh;overflow:auto}
.modal h2{font-family:var(--serif);font-size:18px;margin-bottom:8px;color:var(--brass)}
.modal .lede{font-size:13px;color:var(--cream-dim);line-height:1.65;margin-bottom:18px}
.modal .actions{display:flex;gap:8px;margin-top:18px;justify-content:flex-end}
.choice-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin:14px 0}
.choice{padding:14px 16px;border:1px solid var(--line);border-radius:5px;cursor:pointer;background:var(--ink)}
.choice:hover{border-color:var(--brass)}
.choice.selected{border-color:var(--brass);background:rgba(184,151,74,0.08)}
.choice .ic{font-size:24px;margin-bottom:6px}
.choice .nm{font-weight:600;font-size:14px;margin-bottom:3px}
.choice .desc{font-size:11px;color:var(--cream-dim);line-height:1.5}
.vertical-list{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0}
.vertical-chip{padding:6px 12px;font-size:11px;border:1px solid var(--line);border-radius:14px;color:var(--cream-dim);background:var(--ink);cursor:pointer}
.vertical-chip.active{border-color:var(--brass);color:var(--brass);background:rgba(184,151,74,0.1)}
.build-stage{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:12px}
.build-stage h3{font-family:var(--serif);font-size:13px;margin-bottom:8px;color:var(--brass)}
.preview-area{background:var(--ink);border:1px solid var(--line);border-radius:4px;padding:12px;font-family:var(--mono);font-size:11px;line-height:1.5;color:var(--cream-dim);white-space:pre-wrap;max-height:55vh;overflow:auto;min-height:280px}
.preview-area.streaming{color:var(--cream);border-color:var(--green)}
.cascade-trace{font-family:var(--mono);font-size:10px;background:var(--ink);border:1px solid var(--line);border-radius:3px;padding:8px 10px;margin-top:8px;max-height:180px;overflow-y:auto}
.cascade-trace .line{padding:2px 0;border-bottom:1px solid var(--line-soft)}
.cascade-trace .line:last-child{border-bottom:none}
.cascade-trace .line.ok{color:var(--green)}
.cascade-trace .line.skip{color:var(--cream-muted)}
.cascade-trace .line.fail{color:var(--red)}
.cascade-trace .line.try{color:var(--amber)}
.cascade-trace .line .p{color:var(--brass);font-weight:600}
.provider-row{display:grid;grid-template-columns:auto 80px 1fr 90px 70px;gap:8px;padding:10px;border:1px solid var(--line);border-radius:3px;margin-bottom:6px;align-items:center;font-size:12px;background:var(--ink)}
.provider-row .toggle{width:32px;height:18px;background:var(--line);border-radius:9px;position:relative;cursor:pointer;flex-shrink:0}
.provider-row .toggle.on{background:var(--green)}
.provider-row .toggle::after{content:'';position:absolute;width:14px;height:14px;background:var(--cream);border-radius:50%;top:2px;left:2px;transition:left 0.2s}
.provider-row .toggle.on::after{left:16px}
.provider-row .nm{font-family:var(--mono);font-size:11px;color:var(--cream);font-weight:600}
.provider-row .tag{font-family:var(--mono);font-size:9px;letter-spacing:0.08em;padding:2px 5px;border-radius:3px;text-transform:uppercase;text-align:center}
.provider-row .tag.t1{background:rgba(74,222,128,0.15);color:var(--green)}
.provider-row .tag.t2{background:rgba(96,165,250,0.15);color:var(--blue)}
.provider-row .tag.tf{background:rgba(168,85,247,0.15);color:var(--violet)}
.provider-row .tag.tp{background:rgba(255,140,0,0.15);color:var(--amber)}
@media(max-width:760px){.shell{grid-template-columns:60px 1fr}.side-item span:not(.count):not(.badge){display:none}aside{padding:14px 0}.iframe-shell{left:60px}.build-stage{grid-template-columns:1fr}.app-grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div class="app">
 <header>
 <div class="brand">
 <div class="mark">◊</div>
 <div>
 <div class="name">FallDesk</div>
 <div class="seal">sovereign workstation · prime 1061</div>
 </div>
 </div>
 <div class="searchbar"><input id="searchInput" placeholder="Search 152 apps · or describe a tool you need (Enter to build)" oninput="onSearch(this.value)" onkeydown="if(event.key==='Enter')onSearchEnter()"></div>
 <button class="tier" id="tierBadge" onclick="switchCat('settings')">CHECKING</button>
 </header>
 <div class="shell">
 <aside id="sidebar"></aside>
 <main id="view"></main>
 </div>
</div>
<div class="iframe-shell" id="iframeShell" style="display:none">
 <button class="iframe-back" onclick="closeAppFrame()">← Back to FallDesk (Esc)</button>
 <iframe id="appFrame"></iframe>
</div>
<div class="modal-bg" id="modal"><div class="modal"><div id="modalBody"></div></div></div>
<div class="toast" id="toast">.</div>

<script>
'use strict';

const VERSION = '1.0.0';
const PRIME = 1061;
const STORE = 'falldesk-v1';
const REGISTRY_URL = 'https://sjgant80-hub.github.io/fall-registry/index.json';

// ═══════════════════════════════════════════════════════════════
// CATEGORIES (sidebar nav · data-driven · extensible)
// ═══════════════════════════════════════════════════════════════
const CATEGORIES = [
 // Section: pinned
 { id: 'desk', section: 'pinned', label: 'My Desk', icon: '⭐' },
 // Section: library
 { id: 'personal', section: 'library', label: 'Personal', icon: '👤' },
 { id: 'business', section: 'library', label: 'Business', icon: '💼' },
 { id: 'entertainment',section: 'library', label: 'Entertainment', icon: '🎮' },
 { id: 'sovereignty', section: 'library', label: 'Sovereignty', icon: '◊' },
 { id: 'guild', section: 'library', label: 'Guild', icon: '⚒' },
 // Section: discover
 { id: 'marketplace', section: 'discover', label: 'Marketplace', icon: '🏪' },
 { id: 'seeds', section: 'discover', label: 'Seeds', icon: '🌱' },
 // Section: create
 { id: 'build', section: 'create', label: 'Build new tool', icon: '✨' },
 // Section: system
 { id: 'settings', section: 'system', label: 'Settings', icon: '⚙' }
];

// Coming-soon categories — visible in sidebar to signal the roadmap, not interactive yet
const COMING_SOON = [
 { id: 'communication', label: 'Communication', icon: '💬', note: 'sovereign chat · WebRTC + relay · v2' },
 { id: 'media', label: 'Media', icon: '📺', note: 'sovereign video/audio · P2P · v2' },
 { id: 'social', label: 'Social', icon: '🌐', note: 'sovereign social · ATproto · v2' },
 { id: 'productivity', label: 'Productivity', icon: '📝', note: 'notes · calendar · tasks · v2' }
];

const SECTION_LABELS = {
 pinned: 'Pinned',
 library: 'My Library',
 discover: 'Discover',
 create: 'Create',
 system: 'System'
};

// ═══════════════════════════════════════════════════════════════
// PROVIDERS · LLM cascade (lifted from FallSeed HR v2)
// ═══════════════════════════════════════════════════════════════
const PROVIDERS = [
 { id: 'webllm', name: 'WebLLM', tier: 'T1', tierLabel: 'sovereign', priority: 1,
 model: 'Llama-3.2-3B-Instruct-q4f16_1-MLC', defaultEnabled: false, pricePer1MIn: 0, pricePer1MOut: 0,
 note: 'In-browser via WebGPU · ~2GB first load · zero network after' },
 { id: 'ollama', name: 'Ollama (local)', tier: 'T2', tierLabel: 'sovereign', priority: 2,
 endpoint: 'http://localhost:11434/v1/chat/completions', model: 'llama3.2', defaultEnabled: true,
 pricePer1MIn: 0, pricePer1MOut: 0, note: 'localhost:11434 · OLLAMA_ORIGINS=* ollama serve' },
 { id: 'lmstudio', name: 'LM Studio', tier: 'T2', tierLabel: 'sovereign', priority: 3,
 endpoint: 'http://localhost:1234/v1/chat/completions', model: 'loaded', defaultEnabled: true,
 pricePer1MIn: 0, pricePer1MOut: 0, note: 'localhost:1234 · enable CORS in Server tab' },
 { id: 'groq', name: 'Groq', tier: 'T3-free', tierLabel: 'free', priority: 4,
 endpoint: 'https://api.groq.com/openai/v1/chat/completions', model: 'llama-3.3-70b-versatile',
 requiresKey: true, defaultEnabled: true, signupUrl: 'https://console.groq.com/keys',
 pricePer1MIn: 0, pricePer1MOut: 0, note: '30 req/min · Llama 3.3 70B · fastest cloud' },
 { id: 'openrouter-free', name: 'OpenRouter free', tier: 'T3-free', tierLabel: 'free', priority: 5,
 endpoint: 'https://openrouter.ai/api/v1/chat/completions', model: 'meta-llama/llama-3.3-70b-instruct:free',
 requiresKey: true, defaultEnabled: true, signupUrl: 'https://openrouter.ai/keys',
 pricePer1MIn: 0, pricePer1MOut: 0, note: 'Free Llama 3.3 70B · 200 req/day' },
 { id: 'google', name: 'Google AI Studio', tier: 'T3-free', tierLabel: 'free', priority: 6,
 endpoint: 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:streamGenerateContent',
 model: 'gemini-2.5-flash', requiresKey: true, defaultEnabled: true, signupUrl: 'https://aistudio.google.com/apikey',
 pricePer1MIn: 0, pricePer1MOut: 0, note: 'Gemini 2.5 Flash · 1M tokens/day free' },
 { id: 'cerebras', name: 'Cerebras', tier: 'T3-free', tierLabel: 'free', priority: 7,
 endpoint: 'https://api.cerebras.ai/v1/chat/completions', model: 'llama-3.3-70b',
 requiresKey: true, defaultEnabled: true, signupUrl: 'https://cloud.cerebras.ai/platform',
 pricePer1MIn: 0, pricePer1MOut: 0, note: 'Llama 3.3 70B at 2200 tok/sec' },
 { id: 'anthropic', name: 'Anthropic', tier: 'T3-paid', tierLabel: 'paid', priority: 8,
 endpoint: 'https://api.anthropic.com/v1/messages', model: 'claude-sonnet-4-20250514',
 requiresKey: true, defaultEnabled: false, signupUrl: 'https://console.anthropic.com/',
 pricePer1MIn: 3, pricePer1MOut: 15, paid: true, note: 'Sonnet 4 · highest quality codegen' }
];

// ═══════════════════════════════════════════════════════════════
// CATEGORIZER — map registry entries → our taxonomy
// ═══════════════════════════════════════════════════════════════
function categorize(app) {
 const n = (app.name || '').toLowerCase();
 const c = (app.category || '').toLowerCase();
 const b = (app.bundle || '').toLowerCase();
 if (/^fallaccount|^falladviser|^fallstack|^falllife|^fallhealth/.test(n)) return 'personal';
 if (/kard|warhum/.test(n)) return 'entertainment';
 if (c.includes('guild') || /^acg-/.test(n)) return 'guild';
 if (/fallseed|konom|fallmesh|fall-mcp|fallrelay|fall-hot|fall-euaiact|fallcompass/.test(n)) return 'sovereignty';
 if (/firm|wedge|business|vertical/.test(b+c) || /^fall(hr|legal|books|claim|insurance|mortgage|estate|clinic|vet|recruit|paper|onboard|practice|advis|adv)/.test(n)) return 'business';
 if (c.includes('meta')) return 'sovereignty';
 return 'sovereignty';
}

function bundleOf(app) { return (app.bundle || '').toLowerCase().replace(/-firm$/, '').replace(/-practice$/, ''); }
function roleOf(app) { return app.bundleRole || ''; }

// ═══════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════
let state = {
 active: 'desk',
 catalog: [],
 catalogTs: 0,
 installed: {}, // name → { name, html, version, installedAt, source }
 pinned: new Set(),
 generated: [], // tools created via build engine
 providerConfig: {},
 rateLimits: {},
 usage: {},
 webllmEngine: null,
 webllmStatus: 'unloaded',
 prefs: { audience: null, verticals: [], aiTier: null, completed: false },
 searchQuery: '',
 bundleFilter: '',
 marketCategory: 'all',
 webgpuOk: !!navigator.gpu
};

const $ = (s, p = document) => p.querySelector(s);
const esc = s => String(s == null ? '' : s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
const uid = p => (p || '') + '_' + Math.random().toString(36).slice(2, 11);
const now = () => Date.now();
function toast(m) {
 const t = $('#toast'); t.textContent = m; t.classList.add('show');
 clearTimeout(t._to); t._to = setTimeout(() => t.classList.remove('show'), 2200);

async function sha256(s) {

}

let db;
function openDB() {
 return new Promise((res, rej) => {
 const r = indexedDB.open(STORE, 1);
 r.onupgradeneeded = e => {
 const d = e.target.result;
 ['config', 'installed', 'generated', 'catalog'].forEach(s => {
 if (!d.objectStoreNames.contains(s)) {
 d.createObjectStore(s, s === 'config' || s === 'catalog' ? {} : { keyPath: 'id' });
 }
 });
 };
 r.onsuccess = e => { db = e.target.result; res(db); };
 r.onerror = rej;
 });
}
function idbGet(s, k) { return new Promise(r => { const tx = db.transaction(s,'readonly'); const q = tx.objectStore(s).get(k); q.onsuccess = () => r(q.result); }); }
function idbGetAll(s) { return new Promise(r => { const tx = db.transaction(s,'readonly'); const q = tx.objectStore(s).getAll(); q.onsuccess = () => r(q.result||[]); }); }
function idbPut(s, v, k) { return new Promise(r => { const tx = db.transaction(s,'readwrite'); const o = tx.objectStore(s); const q = k != null ? o.put(v, k) : o.put(v); q.onsuccess = () => r(true); }); }
function idbDelete(s, k) { return new Promise(r => { const tx = db.transaction(s,'readwrite'); tx.objectStore(s).delete(k); tx.oncomplete = () => r(true); }); }

async function detectLocalRunner(endpoint) {
 try {
 const ep = endpoint.replace('/v1/chat/completions', endpoint.includes('11434') ? '/api/version' : '/v1/models');
 const r = await Promise.race([fetch(ep, { method: 'GET' }), new Promise((_, rej) => setTimeout(() => rej('timeout'), 1500))]);
 return r.ok;
 } catch (e) { return false; }
}
async function providerAvailable(p) {
 const cfg = state.providerConfig[p.id] || {};
 if (!cfg.enabled) return { ok: false, reason: 'disabled' };
 if (p.requiresKey && !cfg.key) return { ok: false, reason: 'no key' };
 const rl = state.rateLimits[p.id];
 if (rl && rl.until > now()) return { ok: false, reason: 'rate-limited' };
 if (p.tier === 'T2') {
 const reachable = await detectLocalRunner(p.endpoint);
 if (!reachable) return { ok: false, reason: 'not on ' + p.endpoint.match(/localhost:\d+/)[0] };
 }
 if (p.id === 'webllm' && !navigator.gpu) return { ok: false, reason: 'no WebGPU' };
 return { ok: true };
}
async function readSSE(reader, onLine) {
 const decoder = new TextDecoder(); let buf = '';
 while (true) {
 const { done, value } = await reader.read(); if (done) break;
 buf += decoder.decode(value, { stream: true });
 const lines = buf.split('\n'); buf = lines.pop() || '';
 for (const line of lines) {
 const t = line.trim();
 if (t.startsWith('data: ')) { const payload = t.slice(6); if (payload === '[DONE]') return; try { onLine(JSON.parse(payload)); } catch(e){} }
 }
 }
}
async function callOpenAICompatStream(p, key, model, system, user, maxTokens, onToken) {
 const headers = { 'Content-Type': 'application/json', 'Accept': 'text/event-stream' };
 if (key) headers['Authorization'] = 'Bearer ' + key;
 if (p.id === 'openrouter-free') { headers['HTTP-Referer'] = 'https://sjgant80-hub.github.io/falldesk/'; headers['X-Title'] = 'FallDesk'; }
 const resp = await fetch(p.endpoint, { method: 'POST', headers, body: JSON.stringify({ model, stream: true, messages: [{ role:'system', content:system }, { role:'user', content:user }], max_tokens: maxTokens, temperature: 0.3 }) });
 if (resp.status === 429) { state.rateLimits[p.id] = { until: now() + 60000 }; throw new Error('rate-limited'); }
 if (!resp.ok) { const t = await resp.text(); throw new Error(p.name + ' ' + resp.status + ': ' + t.slice(0,150)); }
 let text = '', tokensIn = 0, tokensOut = 0;
 await readSSE(resp.body.getReader(), (data) => {
 const delta = data.choices?.[0]?.delta?.content || '';
 if (delta) { text += delta; onToken(text); }
 if (data.usage) { tokensIn = data.usage.prompt_tokens||tokensIn; tokensOut = data.usage.completion_tokens||tokensOut; }
 });
 if (!tokensOut) tokensOut = Math.ceil(text.length/4);
 return { text, tokensIn, tokensOut, model };
}
async function callAnthropicStream(p, key, model, system, user, maxTokens, onToken) {
 const resp = await fetch(p.endpoint, { method: 'POST', headers: { 'x-api-key':key, 'anthropic-version':'2023-06-01', 'content-type':'application/json', 'anthropic-dangerous-direct-browser-access':'true' }, body: JSON.stringify({ model, max_tokens: maxTokens, system, stream: true, messages: [{ role:'user', content:user }] }) });
 if (resp.status === 429) { state.rateLimits[p.id] = { until: now() + 60000 }; throw new Error('rate-limited'); }
 if (!resp.ok) { const t = await resp.text(); throw new Error('Anthropic ' + resp.status + ': ' + t.slice(0,150)); }
 let text = '', tokensIn = 0, tokensOut = 0;
 await readSSE(resp.body.getReader(), (data) => {
 if (data.type === 'content_block_delta' && data.delta?.text) { text += data.delta.text; onToken(text); }
 if (data.type === 'message_start' && data.message?.usage) tokensIn = data.message.usage.input_tokens || 0;
 if (data.type === 'message_delta' && data.usage) tokensOut = data.usage.output_tokens || tokensOut;
 });
 return { text, tokensIn, tokensOut, model };
}
async function callGoogleStream(p, key, model, system, user, maxTokens, onToken) {
 const ep = p.endpoint + '?key=' + encodeURIComponent(key) + '&alt=sse';
 const resp = await fetch(ep, { method: 'POST', headers: { 'Content-Type':'application/json' }, body: JSON.stringify({ contents: [{ role:'user', parts: [{ text:user }] }], systemInstruction: { parts: [{ text:system }] }, generationConfig: { maxOutputTokens: maxTokens, temperature: 0.3 } }) });
 if (resp.status === 429) { state.rateLimits[p.id] = { until: now() + 60000 }; throw new Error('rate-limited'); }
 if (!resp.ok) { const t = await resp.text(); throw new Error('Google ' + resp.status + ': ' + t.slice(0,150)); }
 let text = '', tokensIn = 0, tokensOut = 0;
 await readSSE(resp.body.getReader(), (data) => {
 const part = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
 if (part) { text += part; onToken(text); }
 if (data.usageMetadata) { tokensIn = data.usageMetadata.promptTokenCount || tokensIn; tokensOut = data.usageMetadata.candidatesTokenCount || tokensOut; }
 });
 return { text, tokensIn, tokensOut, model };
}
async function callWebLLMStream(model, system, user, maxTokens, onToken, onProgress) {
 if (!state.webllmEngine) {
 onProgress && onProgress('loading model (~2GB first time)...');
 state.webllmStatus = 'loading';
 const webllm = await import('https://esm.run/@mlc-ai/web-llm');
 state.webllmEngine = await webllm.CreateMLCEngine(model, { initProgressCallback: pr => onProgress && onProgress(pr.text || 'loading...') });
 state.webllmStatus = 'ready';
 }
 const reply = await state.webllmEngine.chat.completions.create({ messages: [{ role:'system', content:system }, { role:'user', content:user }], max_tokens: maxTokens, temperature: 0.3, stream: true });
 let text = '', tokensOut = 0;
 for await (const chunk of reply) { const delta = chunk.choices?.[0]?.delta?.content || ''; if (delta) { text += delta; onToken(text); tokensOut++; } }
 return { text, tokensIn: Math.ceil((system.length+user.length)/4), tokensOut, model };
}
async function callProviderStream(p, system, user, maxTokens, onToken, onProgress) {
 const cfg = state.providerConfig[p.id] || {};
 const model = cfg.customModel || p.model;
 if (p.id === 'webllm') return callWebLLMStream(model, system, user, maxTokens, onToken, onProgress);
 if (p.id === 'anthropic') return callAnthropicStream(p, cfg.key, model, system, user, maxTokens, onToken);
 if (p.id === 'google') return callGoogleStream(p, cfg.key, model, system, user, maxTokens, onToken);
 return callOpenAICompatStream(p, cfg.key, model, system, user, maxTokens, onToken);
}
async function runCascadeStream(system, user, maxTokens, onToken, onTrace) {
 const sorted = PROVIDERS.slice().sort((a,b) => a.priority - b.priority);
 const trace = [];
 for (const p of sorted) {
 const t0 = now();
 const avail = await providerAvailable(p);
 if (!avail.ok) { trace.push({ provider: p.name, status: 'skip', reason: avail.reason, ms: 0 }); onTrace && onTrace(trace); continue; }
 trace.push({ provider: p.name, status: 'try', reason: 'connecting...', ms: 0 }); onTrace && onTrace(trace);
 try {
 const result = await callProviderStream(p, system, user, maxTokens, onToken, (msg) => { trace[trace.length-1].reason = msg; onTrace && onTrace(trace); });
 trace[trace.length-1].status = 'ok';
 trace[trace.length-1].reason = `${result.tokensIn}→${result.tokensOut} · ${result.model}`;
 trace[trace.length-1].ms = now() - t0;
 onTrace && onTrace(trace);
 state.usage[p.id].totalIn += result.tokensIn;
 state.usage[p.id].totalOut += result.tokensOut;
 state.usage[p.id].calls += 1;
 state.usage[p.id].lastUsed = now();
 await persistUsage();
 return { ...result, provider: p, trace };
 } catch (e) {
 trace[trace.length-1].status = 'fail';
 trace[trace.length-1].reason = e.message.slice(0,100);
 trace[trace.length-1].ms = now() - t0;
 onTrace && onTrace(trace);
 }
 }
 throw new Error('All providers failed. Configure at least one in Settings.');
}

function renderSeeds(v) {

 for (const s of seedApps) {
   const lv = s.level ?? 0;
   (byLevel[lv] = byLevel[lv] || []).push(s);
 }
 const levelLabels = {
   0: { title: 'Level 0 · vertical seeds', sub: 'one industry per seed · 4 tools per wedge' },
   1: { title: 'Level 1 · domain seeds',   sub: 'one class of verticals per seed (e.g. compliance frameworks across industries)' },
   2: { title: 'Level 2 · behaviour seeds', sub: 'one class of decisions per seed (e.g. Creator OS · Investor OS · Researcher OS)' },
   3: { title: 'Level 3 · agent seeds',     sub: 'one class of actors per seed (Sales agent · Research agent · Ops agent)' }
 };

 // Fork graph: nodes = seeds, edges = parent→child
 const nodes = seedApps.map(s => ({ id: s.name, name: s.name, level: s.level ?? 0, parent: s.parent || null, prime: s.prime }));
 const roots = nodes.filter(n => !n.parent);
 const childrenOf = (pname) => nodes.filter(n => n.parent === pname);
 function renderNode(n, depth) {
   const kids = childrenOf(n.name);
   return `<div style="padding:6px 0;border-left:${depth?'1px solid var(--line)':'none'};margin-left:${depth*16}px;padding-left:${depth?12:0}px">
     <span style="font-family:var(--mono);font-size:12px;color:var(--brass);font-weight:600">${esc(n.name)}</span>
     <span style="font-family:var(--mono);font-size:10px;color:var(--cream-muted);margin-left:8px">L${n.level} · prime ${n.prime||'—'}</span>
   </div>${kids.map(k => renderNode(k, depth+1)).join('')}`;
 }

 v.innerHTML = `
 <div class="section-h"><h2>🌱 Seeds</h2><div class="sub">${seedApps.length} seeds across ${Object.keys(byLevel).length} level${Object.keys(byLevel).length===1?'':'s'} · forkable replication mechanism</div></div>

 }).join('')}

 ${seedApps.length > 1 ? `<div class="section-h" style="margin-top:24px"><h2 style="font-size:15px">Family tree</h2><div class="sub">parent → child fork graph</div></div>
 <div class="card" style="font-family:var(--mono);font-size:12px">

async function wizSetAudience(a) { state.prefs.audience = a; if (!state.prefs.verticals) state.prefs.verticals = []; await persistPrefs(); showWizardIfNeeded(); }
async function wizToggleVertical(v) { state.prefs.verticals = state.prefs.verticals || []; const i = state.prefs.verticals.indexOf(v); if (i>=0) state.prefs.verticals.splice(i,1); else state.prefs.verticals.push(v); await persistPrefs(); showWizardIfNeeded(); }
async function wizSetAiTier(t) { state.prefs.aiTier = t; await persistPrefs(); showWizardIfNeeded(); }
async function wizComplete() {
 state.prefs.completed = true;
 await persistPrefs();
 // Pre-enable providers based on tier choice
 if (state.prefs.aiTier === 'sovereign') {
 state.providerConfig.webllm.enabled = true;
 state.providerConfig.ollama.enabled = true;
 } else if (state.prefs.aiTier === 'free') {
 state.providerConfig.groq.enabled = true;
 if (state.providerConfig['openrouter-free']) state.providerConfig['openrouter-free'].enabled = true;
 state.providerConfig.google.enabled = true;
 } else if (state.prefs.aiTier === 'paid') {
 state.providerConfig.anthropic.enabled = true;
 }
 await persistProvider();
 closeModal();
 toast('Welcome to FallDesk');
 switchCat('desk');
}
async function wizSkip() { state.prefs.completed = true; await persistPrefs(); closeModal(); }

// ═══════════════════════════════════════════════════════════════
// SEARCH
// ═══════════════════════════════════════════════════════════════
function onSearch(q) {
 state.searchQuery = q;
 if (state.active === 'marketplace') render();
}
function onSearchEnter() {
 const q = state.searchQuery.trim();
 if (!q) return;
 // If looks like a tool description, treat as build prompt
 if (q.length > 20) { runBuild(q); $('#searchInput').value = ''; state.searchQuery = ''; }
 else { switchCat('marketplace'); }
}

// ═══════════════════════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════════════════════
(async function boot() {
 try {
 await openDB();
 await loadAll();
 initMesh();
 loadCatalog().then(() => { render(); autoDetectProviders().then(() => render()); });
 render();
 if (!state.prefs.completed) setTimeout(showWizardIfNeeded, 300);
 } catch (e) {
 console.error('boot error', e);
 $('#view').innerHTML = '<div class="card">Boot error: ' + esc(e.message) + '</div>';
 }
})();
</script>

<!-- ═══════════════════════ AUTOPILOT · fall-autopilot-kit · fallos cross-tool orchestrator ═══════════════════════ -->
<script type="module">
  try {
    const { installAutopilot } = await import('https://sjgant80-hub.github.io/fall-autopilot-kit/src/autopilot.js');
    const manifestRes = await fetch('https://sjgant80-hub.github.io/fall-autopilot-kit/manifests/fallos.json');
    const manifest = await manifestRes.json();
    manifest.actions = manifest.actions.map(a => ({ ...a, run: async (params) => {
      const fn = window._app?.[a.id];
      if (typeof fn === 'function') return fn(params);
      alert('FallOS autopilot proposes: ' + a.name + ' · params: ' + JSON.stringify(params) + '\n\nThis orchestrator action has not yet implemented the ' + a.id + ' handler. Proposal logged to audit.');
      return { stub: true, action: a.id, params };
    }}));
    manifest.state = () => ({ ...(window._app || {}), openTools: Array.from(document.querySelectorAll('iframe')).map(i => i.src || i.dataset.tool).filter(Boolean), now: new Date().toISOString() });
    installAutopilot(manifest);
  } catch (e) { console.warn('[autopilot] init failed:', e); }
</script>
